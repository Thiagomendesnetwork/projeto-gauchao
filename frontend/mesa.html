<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesa</title>

  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/mesa.css">
</head>
<body>

<header class="mesa-header">

  <div class="header-left">
    <button class="back-btn" onclick="voltar()">← Voltar</button>

    <div>
      <h1>Mesa 02</h1>
      <p>Tempo aberto: 01:20</p>
    </div>
  </div>

  <div class="total-box">
    TOTAL: R$ 137,00
  </div>
</header>

<section class="categoria">
  <h2>Lanches</h2>

  <div class="item">
    <div>
      <h3>X Gauchão 10</h3>
      <span>R$ 35,00</span>
    </div>

    <div class="controle">
      <button>-</button>
      <span>0</span>
      <button>+</button>
    </div>
  </div>

</section>

<footer>
  <button class="salvar">Salvar Pedido</button>
  <button class="fechar">Fechar Conta</button>
</footer>

<script src="js/mesa.js"></script>
<script src="js/permissoes.js"></script>
</body>
</html>
